name: Refresh charts

on:
  schedule:
    # The build ends the series at yesterday, so we want to fire as soon after
    # London midnight as the data is trustworthy. Heathrow reports at :20 and
    # :50, so the last observation of the day lands ~23:55 local; 00:40 UTC
    # clears it even in winter, when UTC and London time coincide. Not on the
    # hour: GitHub's scheduler is most congested there and can slip an hour.
    - cron: '40 0 * * *'
    # Monthly, additionally re-extracting the ECA&D series, which KNMI
    # republishes every few months.
    - cron: '10 1 1 * *'
  workflow_dispatch:
    inputs:
      refresh_ecad:
        description: 'Also re-extract the ECA&D daily series from KNMI'
        type: boolean
        default: false

# Never let two refreshes race to commit.
concurrency:
  group: refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild the site
        run: |
          if [ "${{ github.event.schedule == '10 1 1 * *' || inputs.refresh_ecad }}" = "true" ]; then
            echo "::notice::Re-extracting ECA&D as well"
            python3 build_charts.py --refresh-ecad
          else
            python3 build_charts.py
          fi

      - name: Commit if the output changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A public heathrow_tx.txt heathrow_tn.txt
          if git diff --cached --quiet; then
            echo "::notice::No change — nothing to publish."
            exit 0
          fi
          # The series ends at yesterday in London, which is not today in UTC.
          git commit -m "Refresh charts through $(TZ=Europe/London date -d yesterday +'%-d %b %Y')"
          git push
