<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#faf8f5" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#16130f" media="(prefers-color-scheme: dark)">
<title>Not found — Heathrow temperature</title>
<style>
  :root {
    --surface:#faf8f5; --panel:#ffffff; --plane:#f2efe9;
    --ink:#1a1714; --ink-2:#5c554d; --muted:#948b7f;
    --grid:#e7e2d8; --axis:#cfc8bb; --band:#c9c2b4;
    --ring:rgba(26,23,20,0.08); --hl:rgba(224,99,31,0.14);
    --hot25:#e0631f; --hot30:#c62f2f; --night15:#2a78d6; --night20:#5442b0;
    --warm:var(--hot25); --hot:var(--hot30); --cool:#8aa0b5;
    --shadow:0 1px 2px rgba(26,23,20,.05), 0 8px 24px rgba(26,23,20,.06);
  }
  @media (prefers-color-scheme: dark) { :root {
    --surface:#16130f; --panel:#201c17; --plane:#0e0c09;
    --ink:#f7f3ec; --ink-2:#c3bbad; --muted:#8f867a;
    --grid:#2e2820; --axis:#3d362b; --band:#4a443a;
    --ring:rgba(247,243,236,0.10); --hl:rgba(242,130,74,0.22);
    --hot25:#f2824a; --hot30:#ec6a6a; --night15:#4f97ec; --night20:#9b8cf0;
    --cool:#6f8598;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
  }}
  :root[data-theme="light"] {
    --surface:#faf8f5; --panel:#ffffff; --plane:#f2efe9;
    --ink:#1a1714; --ink-2:#5c554d; --muted:#948b7f;
    --grid:#e7e2d8; --axis:#cfc8bb; --band:#c9c2b4;
    --ring:rgba(26,23,20,0.08); --hl:rgba(224,99,31,0.14);
    --hot25:#e0631f; --hot30:#c62f2f; --night15:#2a78d6; --night20:#5442b0;
    --cool:#8aa0b5;
    --shadow:0 1px 2px rgba(26,23,20,.05), 0 8px 24px rgba(26,23,20,.06);
  }
  :root[data-theme="dark"] {
    --surface:#16130f; --panel:#201c17; --plane:#0e0c09;
    --ink:#f7f3ec; --ink-2:#c3bbad; --muted:#8f867a;
    --grid:#2e2820; --axis:#3d362b; --band:#4a443a;
    --ring:rgba(247,243,236,0.10); --hl:rgba(242,130,74,0.22);
    --hot25:#f2824a; --hot30:#ec6a6a; --night15:#4f97ec; --night20:#9b8cf0;
    --cool:#6f8598;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
  }

  * { box-sizing:border-box; }
  body {
    margin:0; background:var(--surface); color:var(--ink);
    font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .eyebrow { font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); font-weight:600; margin:0 0 14px; }
  h1 { font-size:clamp(30px,5vw,46px); line-height:1.06; letter-spacing:-0.02em;
    margin:0 0 18px; text-wrap:balance; font-weight:680; }

  figure { margin:0; background:var(--panel); border:1px solid var(--ring);
    border-radius:14px; padding:20px 20px 14px; box-shadow:var(--shadow); }
  .cap { display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:2px; }
  .cap-l { display:flex; align-items:center; gap:9px; }
  .dot { width:11px; height:11px; border-radius:3px; flex:none; }
  .cap h2 { font-size:15.5px; font-weight:640; margin:0; letter-spacing:-0.01em; }
  .cap .sub { font-size:12.5px; color:var(--muted); }
  .chart { margin-top:12px; position:relative; }
  svg { display:block; width:100%; height:auto; overflow:visible; }

  .sec-head { max-width:700px; margin-bottom:24px; }
  .sec-title { font-size:clamp(22px,3.4vw,32px); font-weight:660; letter-spacing:-0.02em;
    margin:8px 0 12px; text-wrap:balance; }
  .sec-lede { font-size:clamp(15px,2vw,16.5px); color:var(--ink-2); margin:0; max-width:60ch; }

  .tip {
    position:absolute; pointer-events:none; opacity:0; transition:opacity .1s;
    background:var(--ink); color:var(--surface); padding:7px 10px; border-radius:8px;
    font-size:12px; line-height:1.35; white-space:nowrap; z-index:5;
    transform:translate(-50%,-100%); box-shadow:0 6px 18px rgba(0,0,0,.25);
  }
  .tip b { font-variant-numeric:tabular-nums; }
  .tip .yr { color:var(--surface); opacity:.65; font-size:10.5px; letter-spacing:.04em; }

  .toggle {
    background:var(--panel); color:var(--ink-2); border:1px solid var(--ring);
    border-radius:999px; padding:7px 13px; font:inherit; font-size:12.5px;
    cursor:pointer; box-shadow:var(--shadow);
  }
  .toggle:hover { color:var(--ink); }
  :focus-visible { outline:2px solid var(--night15); outline-offset:2px; border-radius:4px; }

  .today { stroke:var(--ink-2); stroke-width:1.25; stroke-dasharray:3 3; stroke-opacity:.75; }
  .today-lab { fill:var(--ink-2); font-size:9.5px; font-weight:620; letter-spacing:.04em; }

  :root {
    --surface:#faf8f5; --ink:#1a1714; --ink-2:#5c554d; --muted:#948b7f; --hot25:#e0631f;
  }
  @media (prefers-color-scheme: dark) {
    :root { --surface:#16130f; --ink:#f7f3ec; --ink-2:#c3bbad; --muted:#8f867a; --hot25:#f2824a; }
  }
  :root[data-theme="light"] { --surface:#faf8f5;--ink:#1a1714;--ink-2:#5c554d;--muted:#948b7f;--hot25:#e0631f; }
  :root[data-theme="dark"]  { --surface:#16130f;--ink:#f7f3ec;--ink-2:#c3bbad;--muted:#8f867a;--hot25:#f2824a; }

  * { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh; display:grid; place-items:center;
    background:var(--surface); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .box { text-align:center; padding:32px; max-width:44ch; }
  .code { font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:600; margin:0 0 14px; }
  h1 { font-size:clamp(26px,5vw,38px); letter-spacing:-0.02em; margin:0 0 14px; font-weight:680; }
  p { color:var(--ink-2); margin:0 0 26px; }
  a { color:var(--hot25); font-weight:600; text-decoration:none; }
  a:hover { text-decoration:underline; }

  .sitebar {
    display:flex; align-items:center; gap:18px; margin:0 0 34px;
    padding-bottom:13px; border-bottom:1px solid var(--ring);
  }
  .brand {
    display:flex; align-items:center; gap:9px; text-decoration:none; color:var(--ink);
    font-size:14px; font-weight:680; letter-spacing:-0.01em; white-space:nowrap;
  }
  .brand-mark {
    width:15px; height:15px; border-radius:4px; flex:none;
    background:linear-gradient(150deg, #4f97ec 0%, #f2824a 55%, #e0504f 100%);
  }
  .sitenav { display:flex; gap:20px; margin-left:auto; align-items:center; }
  .sitenav a {
    position:relative; font-size:13px; font-weight:600; text-decoration:none;
    color:var(--muted); padding:4px 0; transition:color .12s ease;
  }
  .sitenav a:hover { color:var(--ink); }
  .sitenav a[aria-current="page"] { color:var(--ink); }
  .sitenav a[aria-current="page"]::after {
    content:""; position:absolute; left:0; right:0; bottom:-14px;
    height:2px; border-radius:2px; background:var(--ink);
  }
  .sitebar .toggle { position:static; box-shadow:none; padding:6px 11px; font-size:12px; }
  @media (max-width:520px) {
    .sitebar { gap:12px; }
    .brand span:last-child { display:none; }
    .sitenav { gap:14px; }
  }

  /* Both pages get the same measure; they were 1120px and 1080px with different padding. */
  .wrap { max-width:1120px; margin:0 auto; padding:clamp(24px,5vw,64px) clamp(18px,4vw,48px) 72px; }

  /* One segmented control, not two. The explorer's was a different size and used a
     warm active fill; the record page's used ink. */
  .modes, .hmodes {
    display:inline-flex; background:var(--panel); border:1px solid var(--ring);
    border-radius:11px; padding:4px; gap:4px; box-shadow:var(--shadow);
  }
  .mode-btn, .hmode-btn {
    border:none; background:transparent; color:var(--ink-2); font:inherit;
    font-size:13px; font-weight:600; padding:7px 14px; border-radius:8px; cursor:pointer;
  }
  .mode-btn:hover, .hmode-btn:hover { color:var(--ink); }
  .mode-btn.active, .hmode-btn.active { background:var(--ink); color:var(--surface); }
</style>
</head>
<body>

<div class="box">
  <p class="code">Error 404</p>
  <h1>No such page.</h1>
  <p>That address doesn't exist here. The charts are all reachable from the front page.</p>
  <a href="/">← Back to the charts</a>
</div>
</body>
</html>
